name: Scanning Secutiry

on:
  pull_request:
    branches: [main, develop]

# Minimal read-only permissions — no write access to the repo or packages
permissions:
  contents: read

jobs:
  # ── Job 1: Security scans (no Node install needed, runs in parallel) ─────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Scan for hardcoded secrets & credentials
        run: bash scripts/security/scan_secrets.sh .

      - name: Scan for prompt injection & hidden instructions
        run: bash scripts/security/scan_prompt_injection.sh .

      - name: Scan for insecure code patterns
        run: bash scripts/security/scan_code_patterns.sh .

      - name: Scan security-relevant config files
        run: bash scripts/security/scan_configs.sh .
