name: Lint CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Minimal read-only permissions — no write access to the repo or packages
permissions:
  contents: read

jobs:
  # ── Job 2: Install → Audit → Lint → Type-check → Build ──────────────────
  lint-build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (frozen lockfile — no silent upgrades)
        run: pnpm install --frozen-lockfile

      # Fails the build on HIGH or CRITICAL CVEs in production dependencies.
      # NOTE: A known PostCSS CVE (GHSA-qx2v-qp2m-jg93) exists via next's internal
      # postcss@8.4.31. Fix it first by adding to package.json:
      #   "pnpm": { "overrides": { "postcss": ">=8.5.10" } }
      - name: Dependency vulnerability audit
        run: pnpm audit --prod --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
